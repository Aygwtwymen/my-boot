<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بوت Gemini الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --surface2:  #181c24;
    --border:    #1e2330;
    --accent:    #4285f4;
    --accent2:   #34a853;
    --accent3:   #ea4335;
    --accent4:   #fbbc05;
    --text:      #e8eaf0;
    --text-dim:  #6b7280;
    --user-bg:   #0d2137;
    --bot-bg:    #101510;
    --radius:    16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }

  .logo-ring {
    width: 44px; height: 44px; border-radius: 50%;
    background: conic-gradient(#4285f4, #34a853, #fbbc05, #ea4335, #4285f4);
    display: flex; align-items: center; justify-content: center;
    animation: spin 6s linear infinite;
    flex-shrink: 0;
  }
  .logo-ring::after {
    content: '✦';
    font-size: 18px; color: var(--bg);
    background: var(--surface);
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .header-info h1 { font-size: 17px; font-weight: 700; }
  .header-info span { font-size: 12px; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

  .header-actions { margin-right: auto; display: flex; gap: 8px; }
  .btn-icon {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); width: 36px; height: 36px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all .2s;
  }
  .btn-icon:hover { color: var(--accent); border-color: var(--accent); }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 24px 16px;
    display: flex; flex-direction: column; gap: 20px;
    z-index: 1;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  #empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px;
    margin: auto; text-align: center;
  }
  .empty-icon {
    width: 80px; height: 80px; border-radius: 24px;
    background: linear-gradient(135deg, rgba(66,133,244,.15), rgba(52,168,83,.1));
    border: 1px solid rgba(66,133,244,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  #empty-state h2 { font-size: 22px; font-weight: 700; }
  #empty-state p { font-size: 14px; color: var(--text-dim); }

  .suggestion-chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    max-width: 480px; margin-top: 8px;
  }
  .chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 7px 14px;
    border-radius: 20px; font-size: 13px; cursor: pointer;
    transition: all .2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .msg {
    display: flex; gap: 12px; align-items: flex-start;
    max-width: 820px; width: 100%;
    animation: msgIn .25s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .msg.user  { flex-direction: row-reverse; align-self: flex-end; }
  .msg.bot   { align-self: flex-start; }

  .avatar {
    width: 36px; height: 36px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .msg.user .avatar { background: linear-gradient(135deg,#0e3a5c,#4285f422); border: 1px solid #4285f444; }
  .msg.bot  .avatar { background: linear-gradient(135deg,#0a2018,#34a85322); border: 1px solid #34a85344; }

  .bubble {
    padding: 13px 17px;
    border-radius: var(--radius);
    font-size: 15px; line-height: 1.75;
    max-width: calc(100% - 50px);
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(66,133,244,.2);
    border-top-left-radius: 4px;
    color: #d0e8ff;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid rgba(52,168,83,.12);
    border-top-right-radius: 4px;
  }

  .bubble pre {
    background: #0c0f15; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; overflow-x: auto; margin: 10px 0;
    direction: ltr; text-align: left;
  }

  .bubble code:not(pre code) {
    background: #0c0f15; border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--accent);
  }

  .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); opacity: .4;
    animation: bounce 1.2s ease infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: none; opacity:.4; } 30% { transform: translateY(-6px); opacity:1; } }

  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    z-index: 5;
  }

  .input-row {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: rgba(66,133,244,.4); }

  #msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Cairo', sans-serif;
    font-size: 15px; resize: none; max-height: 160px;
    line-height: 1.6; padding: 4px 6px;
  }
  #msg-input::placeholder { color: var(--text-dim); }

  .btn-send {
    width: 40px; height: 40px; border-radius: 12px;
    border: none; cursor: pointer;
    background: linear-gradient(135deg, #4285f4, #34a853);
    color: #fff; font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
  }
  .btn-send:hover { opacity: .88; transform: scale(1.05); }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 11px; color: var(--text-dim);
    text-align: center; margin-top: 8px;
  }

  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px;
    border-radius: 30px; font-size: 13px;
    opacity: 0; transition: all .3s;
    z-index: 100; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    #messages { padding: 16px 10px; }
    .bubble { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-ring"></div>
  <div class="header-info">
    <h1>بوت Gemini الذكي</h1>
    <span id="model-label">gemini-2.0-flash</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="clearChat()" title="مسح المحادثة">🗑️</button>
  </div>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">✦</div>
    <h2>مرحباً! أنا بوت Gemini</h2>
    <p>أرسل لي سؤالك وسأساعدك في أي شيء.</p>
    <div class="suggestion-chips">
      <span class="chip" onclick="useChip(this)">💡 اشرح لي مفهومًا</span>
      <span class="chip" onclick="useChip(this)">🖥️ اكتب لي كود Python</span>
      <span class="chip" onclick="useChip(this)">✍️ ساعدني في الكتابة</span>
      <span class="chip" onclick="useChip(this)">🌍 ترجم لي نصًا</span>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="msg-input" rows="1"
      placeholder="اكتب رسالتك هنا... (Enter للإرسال)"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <div class="input-actions">
      <button class="btn-send" id="send-btn" onclick="sendMessage()" title="إرسال">➤</button>
    </div>
  </div>
  <div class="input-hint">Enter ← إرسال &nbsp;|&nbsp; Shift+Enter ← سطر جديد</div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════
//  GEMINI CONFIG
// ═══════════════════════════════
var API_KEY = 'AIzaSyD-C3LUOKMGJgIVibYg9FLxcvbsPYRCfys';
var MODEL = 'gemini-2.0-flash';
var API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/' + MODEL + ':generateContent?key=' + API_KEY;

var history = [];
var isLoading = false;

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
window.addEventListener('DOMContentLoaded', function() {
  toast('✓ متصل بـ Gemini');
});

// ═══════════════════════════════
//  SEND MESSAGE - FIXED
// ═══════════════════════════════
async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text || isLoading) return;

  // Remove empty state
  var emptyState = document.getElementById('empty-state');
  if (emptyState) emptyState.remove();

  // Show user message
  addBubble('user', escapeHtml(text));
  history.push({ role: 'user', parts: [{ text: text }] });

  // Clear input
  input.value = '';
  autoResize(input);

  // Show typing
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  var typingId = addTyping();

  // Build request body for Gemini
  var requestBody = {
    contents: history,
    systemInstruction: {
      parts: [{ text: 'أنت مساعد مفيد تجيب بالعربية. أجب بشكل واضح ومباشر.' }]
    },
    generationConfig: {
      temperature: 0.7,
      maxOutputTokens: 2048
    }
  };

  try {
    console.log('Sending to Gemini...');

    var res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });

    console.log('Response status:', res.status);

    if (!res.ok) {
      var errText = await res.text();
      console.error('Error response:', errText);
      throw new Error('HTTP ' + res.status + ': ' + errText);
    }

    var data = await res.json();
    console.log('Response data:', data);

    var reply = '';
    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
      var parts = data.candidates[0].content.parts;
      if (parts && parts.length > 0) {
        reply = parts[0].text || '';
      }
    }

    if (!reply) {
      reply = 'عذراً، لم أستطع توليد رد. حاول مرة أخرى.';
    }

    removeTyping(typingId);
    addBubble('bot', renderMarkdown(reply));
    history.push({ role: 'model', parts: [{ text: reply }] });

  } catch (err) {
    console.error('Error:', err);
    removeTyping(typingId);
    addBubble('bot', '<span style="color:#ea4335">⚠ خطأ: ' + escapeHtml(err.message) + '</span>');
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

// ═══════════════════════════════
//  HELPERS
// ═══════════════════════════════
function addBubble(role, html) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  var icon = role === 'user' ? '👤' : '✦';
  div.innerHTML = '<div class="avatar">' + icon + '</div><div class="bubble">' + html + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

var typingCounter = 0;
function addTyping() {
  var id = ++typingCounter;
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-' + id;
  div.innerHTML = '<div class="avatar">✦</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeTyping(id) {
  var el = document.getElementById('typing-' + id);
  if (el) el.remove();
}

function renderMarkdown(text) {
  if (!text) return '';
  var t = text;
  // Code blocks
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
  });
  // Inline code
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Lists
  t = t.replace(/^[\-\*] (.+)$/gm, '<li style="margin-right:14px">$1</li>');
  t = t.replace(/(<li[\s\S]+?<\/li>)/g, '<ul style="margin:8px 0">$1</ul>');
  // Headers
  t = t.replace(/^### (.+)$/gm, '<h3 style="font-size:16px;margin:10px 0 5px;color:#4285f4">$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2 style="font-size:18px;margin:12px 0 6px;color:#4285f4">$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1 style="font-size:20px;margin:14px 0 8px;color:#4285f4">$1</h1>');
  // Links
  t = t.replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" style="color:#4285f4">$1</a>');
  // Newlines
  t = t.replace(/\n\n/g, '<br><br>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function escapeHtml(text) {
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function clearChat() {
  history = [];
  document.getElementById('messages').innerHTML = '<div id="empty-state"><div class="empty-icon">✦</div><h2>مرحباً! أنا بوت Gemini</h2><p>أرسل لي سؤالك وسأساعدك في أي شيء.</p><div class="suggestion-chips"><span class="chip" onclick="useChip(this)">💡 اشرح لي مفهومًا</span><span class="chip" onclick="useChip(this)">🖥️ اكتب لي كود Python</span><span class="chip" onclick="useChip(this)">✍️ ساعدني في الكتابة</span><span class="chip" onclick="useChip(this)">🌍 ترجم لي نصًا</span></div></div>';
  toast('تم مسح المحادثة');
}

function useChip(el) {
  document.getElementById('msg-input').value = el.textContent;
  document.getElementById('msg-input').focus();
}

var toastTimer;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
