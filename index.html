<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بوت الذكاء الاصطناعي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --surface2:  #181c24;
    --border:    #1e2330;
    --accent:    #00d4aa;
    --accent2:   #0095ff;
    --accent3:   #ff6b6b;
    --text:      #e8eaf0;
    --text-dim:  #6b7280;
    --user-bg:   #0d2137;
    --bot-bg:    #101510;
    --radius:    16px;
    --glow:      0 0 30px rgba(0,212,170,.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
    box-shadow: 0 1px 0 rgba(0,212,170,.08);
  }

  .logo-ring {
    width: 44px; height: 44px; border-radius: 50%;
    background: conic-gradient(var(--accent), var(--accent2), var(--accent), var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    animation: spin 6s linear infinite;
    flex-shrink: 0;
  }
  .logo-ring::after {
    content: '✦';
    font-size: 18px; color: var(--bg);
    background: var(--surface);
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .header-info h1 { font-size: 17px; font-weight: 700; letter-spacing: .3px; }
  .header-info span {
    font-size: 12px; color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-actions { margin-right: auto; display: flex; gap: 8px; }

  .btn-icon {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); width: 36px; height: 36px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; font-size: 16px;
  }
  .btn-icon:hover { color: var(--accent); border-color: var(--accent); }

  /* ── API KEY PANEL ── */
  #api-panel {
    background: linear-gradient(135deg, #0a1628, #0a0c10);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 12px;
    position: relative; z-index: 9;
    animation: slideDown .3s ease;
  }
  @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: none; opacity: 1; } }
  #api-panel.hidden { display: none; }

  #api-panel label { font-size: 13px; color: var(--text-dim); white-space: nowrap; }
  #api-key-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 10px;
    outline: none;
    transition: border-color .2s;
    direction: ltr;
  }
  #api-key-input:focus { border-color: var(--accent); }
  #api-key-input::placeholder { color: var(--text-dim); }

  .btn-save {
    background: var(--accent); color: var(--bg);
    border: none; padding: 8px 18px;
    border-radius: 10px; cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 700; font-size: 13px;
    transition: opacity .2s;
    white-space: nowrap;
  }
  .btn-save:hover { opacity: .85; }

  .api-status {
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap;
  }
  .api-status.ok  { background: rgba(0,212,170,.12); color: var(--accent); }
  .api-status.err { background: rgba(255,107,107,.12); color: var(--accent3); }

  /* ── MESSAGES AREA ── */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 24px 16px;
    display: flex; flex-direction: column; gap: 20px;
    position: relative; z-index: 1;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px;
    margin: auto; text-align: center;
    animation: fadeIn .6s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .empty-icon {
    width: 80px; height: 80px; border-radius: 24px;
    background: linear-gradient(135deg, rgba(0,212,170,.15), rgba(0,149,255,.1));
    border: 1px solid rgba(0,212,170,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  #empty-state h2 { font-size: 22px; font-weight: 700; }
  #empty-state p { font-size: 14px; color: var(--text-dim); max-width: 300px; line-height: 1.7; }

  .suggestion-chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    max-width: 480px; margin-top: 8px;
  }
  .chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 7px 14px;
    border-radius: 20px; font-size: 13px; cursor: pointer;
    transition: all .2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MESSAGE BUBBLE ── */
  .msg {
    display: flex; gap: 12px; align-items: flex-start;
    max-width: 820px; width: 100%;
    animation: msgIn .25s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg.user  { flex-direction: row-reverse; margin-right: auto; }
  .msg.bot   { margin-left: auto; }

  .avatar {
    width: 36px; height: 36px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .msg.user .avatar { background: linear-gradient(135deg,#0e3a5c,#0095ff22); border: 1px solid #0095ff44; }
  .msg.bot  .avatar { background: linear-gradient(135deg,#0a2018,#00d4aa22); border: 1px solid #00d4aa44; }

  .bubble {
    padding: 13px 17px;
    border-radius: var(--radius);
    font-size: 15px; line-height: 1.75;
    max-width: calc(100% - 50px);
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(0,149,255,.2);
    border-top-left-radius: 4px;
    color: #d0e8ff;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid rgba(0,212,170,.12);
    border-top-right-radius: 4px;
  }

  .bubble img.preview {
    max-width: 260px; max-height: 200px;
    border-radius: 10px; margin-bottom: 10px;
    display: block; border: 1px solid var(--border);
  }

  .bubble pre {
    background: #0c0f15; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; overflow-x: auto; margin: 10px 0;
    direction: ltr; text-align: left;
  }

  .bubble code:not(pre code) {
    background: #0c0f15; border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--accent);
  }

  /* ── TYPING INDICATOR ── */
  .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); opacity: .4;
    animation: bounce 1.2s ease infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: none; opacity:.4; } 30% { transform: translateY(-6px); opacity:1; } }

  /* ── IMAGE PREVIEW STRIP ── */
  #img-preview-strip {
    display: none; gap: 10px; padding: 10px 16px;
    background: var(--surface); border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  #img-preview-strip.visible { display: flex; }

  .preview-thumb {
    position: relative; display: inline-block;
  }
  .preview-thumb img {
    width: 70px; height: 70px; border-radius: 10px;
    object-fit: cover; border: 1px solid var(--border);
  }
  .preview-thumb .remove-img {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent3); border: none;
    color: #fff; font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  /* ── INPUT AREA ── */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    position: relative; z-index: 5;
  }

  .input-row {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: rgba(0,212,170,.4); box-shadow: var(--glow); }

  #msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Cairo', sans-serif;
    font-size: 15px; resize: none; max-height: 160px;
    line-height: 1.6; padding: 4px 6px;
    scrollbar-width: thin;
  }
  #msg-input::placeholder { color: var(--text-dim); }

  .input-actions { display: flex; gap: 6px; align-items: flex-end; }

  .btn-attach, .btn-send {
    width: 40px; height: 40px; border-radius: 12px;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .2s; flex-shrink: 0;
  }
  .btn-attach {
    background: var(--surface); color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-attach:hover { color: var(--accent2); border-color: var(--accent2); }

  .btn-send {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--bg); font-size: 17px;
  }
  .btn-send:hover { opacity: .88; transform: scale(1.05); }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  #file-input { display: none; }

  .input-hint {
    font-size: 11px; color: var(--text-dim);
    text-align: center; margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px;
    border-radius: 30px; font-size: 13px;
    opacity: 0; transition: all .3s; pointer-events: none;
    z-index: 100; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── MODAL ── */
  #settings-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
  }
  #settings-modal.open { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; width: 90%; max-width: 440px;
    animation: popIn .25s ease;
  }
  @keyframes popIn { from { transform: scale(.95); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-box h3 { font-size: 18px; margin-bottom: 20px; }
  .modal-box label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 6px; }
  .modal-box select, .modal-box input[type=range] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px; outline: none;
    font-family: 'Cairo', sans-serif; font-size: 14px; margin-bottom: 16px;
    appearance: none;
  }
  .modal-box input[type=range] { padding: 0; height: 4px; cursor: pointer; accent-color: var(--accent); }
  .range-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .range-row input { flex: 1; }
  .range-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); min-width: 30px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  .btn-cancel {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 9px 18px;
    border-radius: 10px; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 13px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    #messages { padding: 16px 10px; }
    .bubble { font-size: 14px; }
    .modal-box { padding: 20px; }
  }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo-ring"></div>
  <div class="header-info">
    <h1>بوت الذكاء الاصطناعي</h1>
    <span id="model-label">claude-sonnet-4</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="openSettings()" title="الإعدادات">⚙️</button>
    <button class="btn-icon" onclick="clearChat()" title="مسح المحادثة">🗑️</button>
    <button class="btn-icon" onclick="toggleApiPanel()" title="مفتاح API">🔑</button>
  </div>
</header>

<!-- ══ API KEY PANEL ══ -->
<div id="api-panel">
  <label>مفتاح Anthropic API</label>
  <input id="api-key-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off" />
  <button class="btn-save" onclick="saveApiKey()">حفظ</button>
  <span id="api-status" class="api-status" style="display:none"></span>
</div>

<!-- ══ MESSAGES ══ -->
<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">🤖</div>
    <h2>مرحباً! كيف يمكنني مساعدتك؟</h2>
    <p>يمكنك إرسال نصوص أو صور، وسأجيبك على أي سؤال.</p>
    <div class="suggestion-chips">
      <span class="chip" onclick="useChip(this)">📸 حلّل هذه الصورة</span>
      <span class="chip" onclick="useChip(this)">💡 اشرح مفهومًا ما</span>
      <span class="chip" onclick="useChip(this)">🖥️ اكتب لي كودًا</span>
      <span class="chip" onclick="useChip(this)">✍️ ساعدني في الكتابة</span>
    </div>
  </div>
</div>

<!-- ══ IMAGE PREVIEW STRIP ══ -->
<div id="img-preview-strip"></div>

<!-- ══ INPUT AREA ══ -->
<div id="input-area">
  <div class="input-row">
    <textarea id="msg-input" rows="1"
      placeholder="اكتب رسالتك هنا... (Shift+Enter لسطر جديد)"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <div class="input-actions">
      <button class="btn-attach" onclick="document.getElementById('file-input').click()" title="إرفاق صورة">📎</button>
      <input id="file-input" type="file" accept="image/*" multiple onchange="handleFiles(event)" />
      <button class="btn-send" id="send-btn" onclick="sendMessage()" title="إرسال">➤</button>
    </div>
  </div>
  <div class="input-hint">Shift+Enter ← سطر جديد &nbsp;|&nbsp; Enter ← إرسال &nbsp;|&nbsp; يدعم JPEG, PNG, WebP, GIF</div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<!-- ══ SETTINGS MODAL ══ -->
<div id="settings-modal">
  <div class="modal-box">
    <h3>⚙️ الإعدادات</h3>

    <label>النموذج</label>
    <select id="model-select" onchange="saveSettings()">
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4 (الأذكى / الموصى به)</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (الأسرع / الأرخص)</option>
    </select>

    <label>الشخصية / System Prompt</label>
    <textarea id="system-prompt" rows="4" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;font-family:'Cairo',sans-serif;font-size:13px;outline:none;resize:vertical;margin-bottom:16px;">أنت مساعد ذكاء اصطناعي متعدد اللغات يفهم العربية والإنجليزية. أجب بشكل واضح ومفيد.</textarea>

    <label>درجة الإبداع (Temperature): <span id="temp-val" class="range-val">0.7</span></label>
    <div class="range-row">
      <input type="range" id="temp-range" min="0" max="1" step="0.1" value="0.7"
        oninput="document.getElementById('temp-val').textContent=this.value; saveSettings()" />
    </div>

    <label>أقصى رد (Max Tokens): <span id="tokens-val" class="range-val">1024</span></label>
    <div class="range-row">
      <input type="range" id="tokens-range" min="256" max="4096" step="256" value="1024"
        oninput="document.getElementById('tokens-val').textContent=this.value; saveSettings()" />
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSettings()">إغلاق</button>
      <button class="btn-save" onclick="saveSettings(); closeSettings()">حفظ</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let apiKey      = localStorage.getItem('claude_api_key') || '';
let history     = [];        // [{role, content}]
let pendingImgs = [];        // [{base64, mediaType, previewUrl}]
let isLoading   = false;

let settings = JSON.parse(localStorage.getItem('claude_settings') || JSON.stringify({
  model:        'claude-sonnet-4-20250514',
  temperature:  0.7,
  max_tokens:   1024,
  system:       'أنت مساعد ذكاء اصطناعي متعدد اللغات يفهم العربية والإنجليزية. أجب بشكل واضح ومفيد.'
}));

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  applySettings();
  if (!apiKey) {
    document.getElementById('api-panel').classList.remove('hidden');
  } else {
    document.getElementById('api-panel').classList.add('hidden');
    showApiStatus('✓ متصل', 'ok');
  }
});

// ══════════════════════════════════════════════
//  API KEY
// ══════════════════════════════════════════════
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-ant-')) {
    showApiStatus('⚠ تأكد من صحة المفتاح', 'err');
    return;
  }
  apiKey = val;
  localStorage.setItem('claude_api_key', apiKey);
  showApiStatus('✓ تم الحفظ', 'ok');
  setTimeout(() => document.getElementById('api-panel').classList.add('hidden'), 900);
  toast('تم حفظ مفتاح API ✓');
}

function toggleApiPanel() {
  const panel = document.getElementById('api-panel');
  panel.classList.toggle('hidden');
  if (!panel.classList.contains('hidden')) {
    document.getElementById('api-key-input').value = apiKey;
    document.getElementById('api-key-input').focus();
  }
}

function showApiStatus(msg, type) {
  const el = document.getElementById('api-status');
  el.textContent = msg;
  el.className = `api-status ${type}`;
  el.style.display = '';
}

// ══════════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════════
function applySettings() {
  document.getElementById('model-select').value     = settings.model;
  document.getElementById('system-prompt').value    = settings.system;
  document.getElementById('temp-range').value       = settings.temperature;
  document.getElementById('temp-val').textContent   = settings.temperature;
  document.getElementById('tokens-range').value     = settings.max_tokens;
  document.getElementById('tokens-val').textContent = settings.max_tokens;
  document.getElementById('model-label').textContent = settings.model.replace(/-\d{8}$/,'');
}

function saveSettings() {
  settings.model       = document.getElementById('model-select').value;
  settings.system      = document.getElementById('system-prompt').value;
  settings.temperature = parseFloat(document.getElementById('temp-range').value);
  settings.max_tokens  = parseInt(document.getElementById('tokens-range').value);
  localStorage.setItem('claude_settings', JSON.stringify(settings));
  document.getElementById('model-label').textContent = settings.model.replace(/-\d{8}$/,'');
}

function openSettings()  { document.getElementById('settings-modal').classList.add('open'); applySettings(); }
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }

// ══════════════════════════════════════════════
//  IMAGE HANDLING
// ══════════════════════════════════════════════
async function handleFiles(e) {
  const files = Array.from(e.target.files);
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const base64 = await toBase64(file);
    pendingImgs.push({ base64, mediaType: file.type, previewUrl: URL.createObjectURL(file) });
  }
  renderPreviews();
  e.target.value = '';
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function renderPreviews() {
  const strip = document.getElementById('img-preview-strip');
  strip.innerHTML = '';
  if (!pendingImgs.length) { strip.classList.remove('visible'); return; }
  strip.classList.add('visible');
  pendingImgs.forEach((img, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'preview-thumb';
    thumb.innerHTML = `<img src="${img.previewUrl}" />
      <button class="remove-img" onclick="removeImg(${i})">✕</button>`;
    strip.appendChild(thumb);
  });
}

function removeImg(i) {
  pendingImgs.splice(i, 1);
  renderPreviews();
}

// ══════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();

  if (!apiKey) { toast('⚠ أدخل مفتاح API أولاً 🔑'); toggleApiPanel(); return; }
  if (!text && !pendingImgs.length) return;
  if (isLoading) return;

  // Hide empty state
  document.getElementById('empty-state')?.remove();

  // Build user content
  const contentParts = [];
  const previewHtmlImgs = [];

  for (const img of pendingImgs) {
    contentParts.push({ type:'image', source:{ type:'base64', media_type: img.mediaType, data: img.base64 } });
    previewHtmlImgs.push(`<img class="preview" src="${img.previewUrl}" />`);
  }
  if (text) contentParts.push({ type:'text', text });

  // Show user bubble
  addBubble('user', previewHtmlImgs.join('') + escapeHtml(text));

  // Add to history
  history.push({ role: 'user', content: contentParts.length === 1 && !previewHtmlImgs.length ? text : contentParts });

  // Clear input
  input.value = ''; autoResize(input);
  pendingImgs = []; renderPreviews();

  // Show typing
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  const typingId = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':            'application/json',
        'x-api-key':               apiKey,
        'anthropic-version':       '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model:       settings.model,
        max_tokens:  settings.max_tokens,
        temperature: settings.temperature,
        system:      settings.system,
        messages:    history
      })
    });

    removeTyping(typingId);

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data    = await res.json();
    const reply   = data.content?.[0]?.text || '(لا يوجد رد)';
    const htmlMd  = renderMarkdown(reply);

    addBubble('bot', htmlMd);
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping(typingId);
    addBubble('bot', `<span style="color:var(--accent3)">⚠ خطأ: ${escapeHtml(err.message)}</span>`);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

// ══════════════════════════════════════════════
//  RENDER HELPERS
// ══════════════════════════════════════════════
function addBubble(role, html) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  const icon = role === 'user' ? '👤' : '✦';
  div.innerHTML = `
    <div class="avatar">${icon}</div>
    <div class="bubble">${html}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

let typingCounter = 0;
function addTyping() {
  const id  = ++typingCounter;
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg bot'; div.id = `typing-${id}`;
  div.innerHTML = `<div class="avatar">✦</div>
    <div class="bubble"><div class="typing-dots">
      <span></span><span></span><span></span>
    </div></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeTyping(id) {
  document.getElementById(`typing-${id}`)?.remove();
}

function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3 style="font-size:16px;margin:10px 0 5px;color:var(--accent)">$1</h3>');
  text = text.replace(/^## (.+)$/gm,  '<h2 style="font-size:18px;margin:12px 0 6px;color:var(--accent)">$1</h2>');
  text = text.replace(/^# (.+)$/gm,   '<h1 style="font-size:20px;margin:14px 0 8px;color:var(--accent)">$1</h1>');
  // Lists
  text = text.replace(/^- (.+)$/gm, '<li style="margin-right:14px">$1</li>');
  text = text.replace(/(<li[\s\S]+?<\/li>)/g, '<ul style="margin:8px 0">$1</ul>');
  // Links
  text = text.replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent2)">$1</a>');
  // Newlines
  text = text.replace(/\n\n/g, '<br><br>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function clearChat() {
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div id="empty-state">
      <div class="empty-icon">🤖</div>
      <h2>مرحباً! كيف يمكنني مساعدتك؟</h2>
      <p>يمكنك إرسال نصوص أو صور، وسأجيبك على أي سؤال.</p>
      <div class="suggestion-chips">
        <span class="chip" onclick="useChip(this)">📸 حلّل هذه الصورة</span>
        <span class="chip" onclick="useChip(this)">💡 اشرح مفهومًا ما</span>
        <span class="chip" onclick="useChip(this)">🖥️ اكتب لي كودًا</span>
        <span class="chip" onclick="useChip(this)">✍️ ساعدني في الكتابة</span>
      </div>
    </div>`;
  toast('تم مسح المحادثة');
}

function useChip(el) {
  document.getElementById('msg-input').value = el.textContent;
  document.getElementById('msg-input').focus();
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Drag & Drop images anywhere
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', async e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  for (const file of files) {
    const base64 = await toBase64(file);
    pendingImgs.push({ base64, mediaType: file.type, previewUrl: URL.createObjectURL(file) });
  }
  if (files.length) { renderPreviews(); toast(`تم إرفاق ${files.length} صورة`); }
});
</script>
