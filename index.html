<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بوت Gemini الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --surface2:  #181c24;
    --border:    #1e2330;
    --accent:    #00d4aa;
    --accent2:   #0095ff;
    --accent3:   #ff6b6b;
    --accent4:   #4285f4;
    --text:      #e8eaf0;
    --text-dim:  #6b7280;
    --user-bg:   #0d2137;
    --bot-bg:    #101510;
    --radius:    16px;
    --glow:      0 0 30px rgba(66,133,244,.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 10;
    box-shadow: 0 1px 0 rgba(66,133,244,.08);
  }

  .logo-ring {
    width: 44px; height: 44px; border-radius: 50%;
    background: conic-gradient(#4285f4, #34a853, #fbbc05, #ea4335, #4285f4);
    display: flex; align-items: center; justify-content: center;
    animation: spin 6s linear infinite;
    flex-shrink: 0;
  }
  .logo-ring::after {
    content: '✦';
    font-size: 18px; color: var(--bg);
    background: var(--surface);
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .header-info h1 { font-size: 17px; font-weight: 700; letter-spacing: .3px; }
  .header-info span {
    font-size: 12px; color: var(--accent4);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-actions { margin-right: auto; display: flex; gap: 8px; }

  .btn-icon {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); width: 36px; height: 36px;
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; font-size: 16px;
  }
  .btn-icon:hover { color: var(--accent4); border-color: var(--accent4); }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 24px 16px;
    display: flex; flex-direction: column; gap: 20px;
    position: relative; z-index: 1;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  #empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px;
    margin: auto; text-align: center;
    animation: fadeIn .6s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .empty-icon {
    width: 80px; height: 80px; border-radius: 24px;
    background: linear-gradient(135deg, rgba(66,133,244,.15), rgba(52,168,83,.1));
    border: 1px solid rgba(66,133,244,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  #empty-state h2 { font-size: 22px; font-weight: 700; }
  #empty-state p { font-size: 14px; color: var(--text-dim); max-width: 300px; line-height: 1.7; }

  .suggestion-chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    max-width: 480px; margin-top: 8px;
  }
  .chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 7px 14px;
    border-radius: 20px; font-size: 13px; cursor: pointer;
    transition: all .2s;
  }
  .chip:hover { border-color: var(--accent4); color: var(--accent4); }

  .msg {
    display: flex; gap: 12px; align-items: flex-start;
    max-width: 820px; width: 100%;
    animation: msgIn .25s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg.user  { flex-direction: row-reverse; margin-right: auto; }
  .msg.bot   { margin-left: auto; }

  .avatar {
    width: 36px; height: 36px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .msg.user .avatar { background: linear-gradient(135deg,#0e3a5c,#4285f422); border: 1px solid #4285f444; }
  .msg.bot  .avatar { background: linear-gradient(135deg,#0a2018,#34a85322); border: 1px solid #34a85344; }

  .bubble {
    padding: 13px 17px;
    border-radius: var(--radius);
    font-size: 15px; line-height: 1.75;
    max-width: calc(100% - 50px);
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(66,133,244,.2);
    border-top-left-radius: 4px;
    color: #d0e8ff;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid rgba(52,168,83,.12);
    border-top-right-radius: 4px;
  }

  .bubble pre {
    background: #0c0f15; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; overflow-x: auto; margin: 10px 0;
    direction: ltr; text-align: left;
  }

  .bubble code:not(pre code) {
    background: #0c0f15; border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--accent4);
  }

  .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent4); opacity: .4;
    animation: bounce 1.2s ease infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100% { transform: none; opacity:.4; } 30% { transform: translateY(-6px); opacity:1; } }

  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    position: relative; z-index: 5;
  }

  .input-row {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: rgba(66,133,244,.4); box-shadow: var(--glow); }

  #msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Cairo', sans-serif;
    font-size: 15px; resize: none; max-height: 160px;
    line-height: 1.6; padding: 4px 6px;
    scrollbar-width: thin;
  }
  #msg-input::placeholder { color: var(--text-dim); }

  .input-actions { display: flex; gap: 6px; align-items: flex-end; }

  .btn-send {
    width: 40px; height: 40px; border-radius: 12px;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .2s; flex-shrink: 0;
    background: linear-gradient(135deg, #4285f4, #34a853);
    color: #fff; font-size: 17px;
  }
  .btn-send:hover { opacity: .88; transform: scale(1.05); }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 11px; color: var(--text-dim);
    text-align: center; margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px;
    border-radius: 30px; font-size: 13px;
    opacity: 0; transition: all .3s; pointer-events: none;
    z-index: 100; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #settings-modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
  }
  #settings-modal.open { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; width: 90%; max-width: 440px;
    animation: popIn .25s ease;
  }
  @keyframes popIn { from { transform: scale(.95); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-box h3 { font-size: 18px; margin-bottom: 20px; }
  .modal-box label { font-size: 13px; color: var(--text-dim); display: block; margin-bottom: 6px; }
  .modal-box select, .modal-box input[type=range] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px; outline: none;
    font-family: 'Cairo', sans-serif; font-size: 14px; margin-bottom: 16px;
    appearance: none;
  }
  .modal-box input[type=range] { padding: 0; height: 4px; cursor: pointer; accent-color: var(--accent4); }
  .range-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .range-row input { flex: 1; }
  .range-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent4); min-width: 30px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  .btn-cancel {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 9px 18px;
    border-radius: 10px; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 13px;
  }
  .btn-save {
    background: var(--accent4); color: #fff;
    border: none; padding: 9px 18px;
    border-radius: 10px; cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 700; font-size: 13px;
    transition: opacity .2s;
  }
  .btn-save:hover { opacity: .85; }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    #messages { padding: 16px 10px; }
    .bubble { font-size: 14px; }
    .modal-box { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-ring"></div>
  <div class="header-info">
    <h1>بوت Gemini الذكي</h1>
    <span id="model-label">gemini-2.0-flash</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="openSettings()" title="الإعدادات">⚙️</button>
    <button class="btn-icon" onclick="clearChat()" title="مسح المحادثة">🗑️</button>
  </div>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">✦</div>
    <h2>مرحباً! أنا بوت Gemini</h2>
    <p>أرسل لي سؤالك وسأساعدك في أي شيء.</p>
    <div class="suggestion-chips">
      <span class="chip" onclick="useChip(this)">💡 اشرح لي مفهومًا</span>
      <span class="chip" onclick="useChip(this)">🖥️ اكتب لي كود Python</span>
      <span class="chip" onclick="useChip(this)">✍️ ساعدني في الكتابة</span>
      <span class="chip" onclick="useChip(this)">🌍 ترجم لي نصًا</span>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="msg-input" rows="1"
      placeholder="اكتب رسالتك هنا... (Shift+Enter لسطر جديد)"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <div class="input-actions">
      <button class="btn-send" id="send-btn" onclick="sendMessage()" title="إرسال">➤</button>
    </div>
  </div>
  <div class="input-hint">Shift+Enter ← سطر جديد &nbsp;|&nbsp; Enter ← إرسال</div>
</div>

<div id="toast"></div>

<div id="settings-modal">
  <div class="modal-box">
    <h3>⚙️ إعدادات Gemini</h3>

    <label>النموذج</label>
    <select id="model-select" onchange="saveSettings()">
      <option value="gemini-2.0-flash">Gemini 2.0 Flash (سريع)</option>
      <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite (أسرع)</option>
      <option value="gemini-1.5-pro">Gemini 1.5 Pro (أذكى)</option>
      <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
    </select>

    <label>الشخصية / System Prompt</label>
    <textarea id="system-prompt" rows="4" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;font-family:'Cairo',sans-serif;font-size:13px;outline:none;resize:vertical;margin-bottom:16px;">أنت مساعد ذكاء اصطناعي مفيد ومتعاون، تجيب باللغة العربية بشكل واضح ومفصل.</textarea>

    <label>درجة الإبداع (Temperature): <span id="temp-val" class="range-val">0.7</span></label>
    <div class="range-row">
      <input type="range" id="temp-range" min="0" max="2" step="0.1" value="0.7"
        oninput="document.getElementById('temp-val').textContent=this.value; saveSettings()" />
    </div>

    <label>أقصى رد (Max Tokens): <span id="tokens-val" class="range-val">2048</span></label>
    <div class="range-row">
      <input type="range" id="tokens-range" min="256" max="8192" step="256" value="2048"
        oninput="document.getElementById('tokens-val').textContent=this.value; saveSettings()" />
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSettings()">إغلاق</button>
      <button class="btn-save" onclick="saveSettings(); closeSettings()">حفظ</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════
//  GEMINI CONFIGURATION
// ═══════════════════════════════
var GEMINI_API_KEY = 'AIzaSyD-C3LUOKMGJgIVibYg9FLxcvbsPYRCfys';
var GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/';

var history     = [];
var isLoading   = false;

var settings = JSON.parse(localStorage.getItem('gemini_settings') || JSON.stringify({
  model:        'gemini-2.0-flash',
  temperature:  0.7,
  max_tokens:   2048,
  system:       'أنت مساعد ذكاء اصطناعي مفيد ومتعاون، تجيب باللغة العربية بشكل واضح ومفصل.'
}));

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
window.addEventListener('DOMContentLoaded', function() {
  applySettings();
  toast('✓ متصل بـ Gemini - جاهز للمحادثة');
});

// ═══════════════════════════════
//  SETTINGS
// ═══════════════════════════════
function applySettings() {
  document.getElementById('model-select').value     = settings.model;
  document.getElementById('system-prompt').value    = settings.system;
  document.getElementById('temp-range').value       = settings.temperature;
  document.getElementById('temp-val').textContent   = settings.temperature;
  document.getElementById('tokens-range').value     = settings.max_tokens;
  document.getElementById('tokens-val').textContent = settings.max_tokens;
  document.getElementById('model-label').textContent = settings.model;
}

function saveSettings() {
  settings.model       = document.getElementById('model-select').value;
  settings.system      = document.getElementById('system-prompt').value;
  settings.temperature = parseFloat(document.getElementById('temp-range').value);
  settings.max_tokens  = parseInt(document.getElementById('tokens-range').value);
  localStorage.setItem('gemini_settings', JSON.stringify(settings));
  document.getElementById('model-label').textContent = settings.model;
}

function openSettings()  { document.getElementById('settings-modal').classList.add('open'); applySettings(); }
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }

// ═══════════════════════════════
//  SEND MESSAGE
// ═══════════════════════════════
async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text  = input.value.trim();

  if (!text) return;
  if (isLoading) return;

  var emptyState = document.getElementById('empty-state');
  if (emptyState) emptyState.remove();

  addBubble('user', escapeHtml(text));
  history.push({ role: 'user', parts: [{ text: text }] });

  input.value = ''; autoResize(input);

  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  var typingId = addTyping();

  // Build contents array from history
  var contents = [];
  for (var i = 0; i < history.length; i++) {
    contents.push({
      role: history[i].role,
      parts: history[i].parts
    });
  }

  // Gemini API URL
  var apiUrl = GEMINI_API_URL + settings.model + ':generateContent?key=' + GEMINI_API_KEY;

  try {
    var requestBody = {
      contents: contents,
      generationConfig: {
        temperature: settings.temperature,
        maxOutputTokens: settings.max_tokens
      }
    };

    // Add system instruction if provided
    if (settings.system && settings.system.trim() !== '') {
      requestBody.systemInstruction = {
        parts: [{ text: settings.system }]
      };
    }

    var res = await fetch(apiUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(requestBody)
    });

    removeTyping(typingId);

    if (!res.ok) {
      var err = await res.json().catch(function() { return {}; });
      throw new Error(err?.error?.message || 'HTTP Error ' + res.status);
    }

    var data = await res.json();
    var reply = '';
    
    if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
      reply = data.candidates[0].content.parts[0].text || '(لم يتم استلام رد)';
    } else {
      reply = '(لم يتم استلام رد)';
    }

    var htmlMd = renderMarkdown(reply);

    addBubble('bot', htmlMd);
    history.push({ role: 'model', parts: [{ text: reply }] });

  } catch (err) {
    removeTyping(typingId);
    addBubble('bot', '<span style="color:var(--accent3)">⚠ خطأ: ' + escapeHtml(err.message) + '</span>');
    console.error('Gemini API Error:', err);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
}

// ═══════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════
function addBubble(role, html) {
  var msgs = document.getElementById('messages');
  var div  = document.createElement('div');
  var roleClass = (role === 'user') ? 'user' : 'bot';
  div.className = 'msg ' + roleClass;
  var icon = (role === 'user') ? '👤' : '✦';
  div.innerHTML = '<div class="avatar">' + icon + '</div><div class="bubble">' + html + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

var typingCounter = 0;
function addTyping() {
  var id  = ++typingCounter;
  var msgs = document.getElementById('messages');
  var div  = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing-' + id;
  div.innerHTML = '<div class="avatar">✦</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeTyping(id) {
  var el = document.getElementById('typing-' + id);
  if (el) el.remove();
}

function renderMarkdown(text) {
  if (!text) return '';
  var t = text;
  // Code blocks
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, function(match, lang, code) {
    return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
  });
  // Inline code
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  t = t.replace(/^### (.+)$/gm, '<h3 style="font-size:16px;margin:10px 0 5px;color:var(--accent4)">$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2 style="font-size:18px;margin:12px 0 6px;color:var(--accent4)">$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1 style="font-size:20px;margin:14px 0 8px;color:var(--accent4)">$1</h1>');
  // Lists
  t = t.replace(/^- (.+)$/gm, '<li style="margin-right:14px">$1</li>');
  t = t.replace(/(<li[\s\S]+?<\/li>)/g, '<ul style="margin:8px 0">$1</ul>');
  // Links
  t = t.replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent4)">$1</a>');
  // Newlines
  t = t.replace(/\n\n/g, '<br><br>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function escapeHtml(text) {
  return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ═══════════════════════════════
//  UI HELPERS
// ═══════════════════════════════
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function clearChat() {
  history = [];
  document.getElementById('messages').innerHTML = '<div id="empty-state"><div class="empty-icon">✦</div><h2>مرحباً! أنا بوت Gemini</h2><p>أرسل لي سؤالك وسأساعدك في أي شيء.</p><div class="suggestion-chips"><span class="chip" onclick="useChip(this)">💡 اشرح لي مفهومًا</span><span class="chip" onclick="useChip(this)">🖥️ اكتب لي كود Python</span><span class="chip" onclick="useChip(this)">✍️ ساعدني في الكتابة</span><span class="chip" onclick="useChip(this)">🌍 ترجم لي نصًا</span></div></div>';
  toast('تم مسح المحادثة');
}

function useChip(el) {
  document.getElementById('msg-input').value = el.textContent;
  document.getElementById('msg-input').focus();
}

var toastTimer;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
